<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achra Logo Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow: hidden; height: 100%; }

    :root {
      --page-bg: #E8E8E8;
      --slide-bg: #FCFCFC;
      --slide-shadow: rgba(0,0,0,0.08);
      --wordmark-fill: #141414;
      --btn-bg: #FCFCFC;
      --btn-border: #D7D8D9;
      --btn-color: #343839;
      --btn-hover-bg: #F3F5F7;
      --btn-hover-border: #7A3AFF;
    }
    .dark {
      --page-bg: #141618;
      --slide-bg: #1B1E24;
      --slide-shadow: rgba(0,0,0,0.3);
      --wordmark-fill: #FAFAFA;
      --btn-bg: #252A34;
      --btn-border: #485265;
      --btn-color: #F3F5F7;
      --btn-hover-bg: #373E4D;
      --btn-hover-border: #7A3AFF;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--page-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      gap: 24px;
      transition: background 0.3s;
      overflow: hidden;
    }

    .slide {
      width: min(960px, 100%);
      aspect-ratio: 16 / 9;
      border-radius: 10px;
      overflow: hidden;
      background: var(--slide-bg);
      box-shadow: 0 2px 12px var(--slide-shadow);
      transition: background 0.3s, box-shadow 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0;
      scale: clamp(0.4, calc((100vw - 48px) / 960), 1);
      transform-origin: center center;
    }

    /* Wordmark: slides in from right — with this ease-out it visually lands ~0.2s in */
    .logo-wordmark {
      opacity: 0;
      transform: translateX(120px);
      animation:
        slideInRight 0.675s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
      animation-play-state: paused;
    }

    /* Icon: arrives 10ms before wordmark visually settles, then stumbles */
    .logo-icon {
      /* Tweak these to adjust where the icon lands after the 120deg fall */
      --land-x: 0;
      --land-y: 0;

      opacity: 0;
      transform: translateX(-120px);
      animation: slideInLeft 0.975s cubic-bezier(0.25, 0, 0.6, 1) 0.15s forwards;
      animation-play-state: paused;
      transform-origin: 50% 50%;
    }

    @keyframes slideInLeft {
      0%   { opacity: 0; transform: translate(-120px, 0px) rotate(240deg); }
      30%  { opacity: 1; transform: translate(-35px, 0px) rotate(240deg); }
      /* rolls forward 120deg while translating right to land in position */
      55%  { opacity: 1; transform: translate(var(--land-x), var(--land-y)) rotate(360deg); }
      /* bounces back slightly */
      70%  { opacity: 1; transform: translate(var(--land-x), var(--land-y)) rotate(355deg); }
      80%  { opacity: 1; transform: translate(var(--land-x), var(--land-y)) rotate(360deg); }
      100% { opacity: 1; transform: translate(var(--land-x), var(--land-y)) rotate(360deg); }
    }

    @keyframes slideInRight {
      0%   { opacity: 0; transform: translateX(120px); }
      60%  { opacity: 1; transform: translateX(-4px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    .logo-wordmark path { fill: var(--wordmark-fill); transition: fill 0.3s; }

    .replay-btn {
      padding: 8px 20px;
      border: 1.5px solid var(--btn-border);
      border-radius: 8px;
      background: var(--btn-bg);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--btn-color);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .replay-btn:hover {
      background: var(--btn-hover-bg);
      border-color: var(--btn-hover-border);
    }
  </style>
</head>
<body>

  <div class="slide">
    <div class="logo-container" id="logoContainer">
      <!-- Icon (Achra mark — 3 purple paths) -->
      <svg class="logo-icon" width="58" height="56" viewBox="0 0 40.2262 39" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M19.88 25.3777C25.2542 25.3657 30.632 27.4232 34.7324 31.5505C35.696 32.5203 36.546 33.5612 37.2824 34.6563C37.6562 35.212 37.4081 35.9581 36.7914 36.2184L30.4081 38.9131C29.937 39.112 29.395 38.9581 29.0628 38.5689C28.864 38.3361 28.655 38.109 28.4358 37.8884C27.5462 36.9929 26.5519 36.2669 25.4926 35.7106C23.74 34.7899 21.8092 34.3333 19.88 34.3408C17.9507 34.3333 16.02 34.7899 14.2672 35.7106C13.2079 36.2669 12.2137 36.9929 11.3241 37.8884C11.1048 38.109 10.8958 38.3361 10.6971 38.5689C10.3649 38.9581 9.82288 39.112 9.35169 38.9131L2.96844 36.2184C2.35173 35.9581 2.1037 35.212 2.47745 34.6563C3.21391 33.5612 4.0639 32.5203 5.02745 31.5505C9.1278 27.4232 14.5058 25.3657 19.88 25.3777Z" fill="#7A3AFF"/>

        <path fill-rule="evenodd" clip-rule="evenodd" d="M31.1836 5.42862C31.1836 10.5874 34.3878 14.993 38.9022 16.7389C39.3231 16.9017 39.6299 17.2813 39.6648 17.7316L40.2228 24.9336C40.2774 25.6384 39.6656 26.2143 38.974 26.071C29.4444 24.0968 22.2788 15.605 22.2788 5.42862C22.2788 3.84335 22.4527 2.29898 22.7823 0.813752C22.9253 0.169496 23.6194 -0.166983 24.2297 0.0826646L30.575 2.67807C31.0659 2.87888 31.34 3.39971 31.2752 3.92659C31.2147 4.41873 31.1836 4.92001 31.1836 5.42862Z" fill="#7A3AFF"/>
      </svg>

      <!-- Spacer matching the original logo proportions -->
      <div style="width: 17px;"></div>

      <!-- Wordmark: ACHRA -->
      <svg class="logo-wordmark" width="217" height="44" viewBox="0 0 134.77 27.638" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16.3648 0.370516C16.5684 0.370516 16.7514 0.495496 16.8251 0.685326L26.8877 26.5948C27.0134 26.9183 26.7749 27.2671 26.428 27.2673H20.8063C20.6008 27.2673 20.4165 27.14 20.3441 26.9477L18.5166 22.0895L16.5012 16.6428L13.4781 8.64092L11.0265 15.13H15.0285C15.3696 15.13 15.6076 15.468 15.493 15.7895L13.746 20.6862C13.6759 20.8826 13.49 21.0139 13.2815 21.014H8.83762L8.43955 22.0895L6.61159 26.9477C6.53915 27.1399 6.35532 27.2673 6.14991 27.2673H0.494007C0.147197 27.2673 -0.091479 26.9188 0.0337658 26.5952L10.0641 0.685808C10.1377 0.495731 10.3206 0.370536 10.5244 0.370516H16.3648Z" fill="#141414"/>
        <path d="M38.9488 27.6366C30.9881 27.6366 25.3115 22.0219 25.3115 13.7847C25.3115 5.58112 30.9881 6.33937e-08 38.8816 6.33937e-08C45.8839 6.33937e-08 50.9914 4.52012 52.4589 10.71C52.5306 11.0125 52.2968 11.2967 51.986 11.2967H46.1745C45.9536 11.2967 45.7613 11.1491 45.6897 10.94C44.7708 8.25371 42.2016 6.1863 39.0159 6.1863C35.0524 6.1863 32.0294 9.24583 32.0294 13.7847C32.0294 18.2899 35.086 21.2822 39.0831 21.2822C42.3679 21.2822 44.8809 19.397 45.793 16.634C45.8628 16.4226 46.0562 16.2727 46.2787 16.2727H52.0712C52.376 16.2727 52.6084 16.5467 52.5472 16.8454C51.2394 23.2285 46.0604 27.6366 38.9488 27.6366Z" fill="#141414"/>
        <path d="M55.1942 27.2675C54.9216 27.2675 54.7007 27.0465 54.7007 26.7738V0.864186C54.7007 0.59154 54.9216 0.370516 55.1942 0.370516H60.7571C61.0296 0.370516 61.2506 0.591539 61.2506 0.864185V10.6586H71.1594V0.864186C71.1594 0.59154 71.3804 0.370516 71.6529 0.370516H77.1823C77.4548 0.370516 77.6758 0.591539 77.6758 0.864185V26.7738C77.6758 27.0465 77.4548 27.2675 77.1823 27.2675H71.6529C71.3804 27.2675 71.1594 27.0465 71.1594 26.7738V16.5423H61.2506V26.7738C61.2506 27.0465 61.0296 27.2675 60.7571 27.2675H55.1942Z" fill="#141414"/>
        <path d="M81.976 27.2675C81.7035 27.2675 81.4825 27.0465 81.4825 26.7738V0.864186C81.4825 0.59154 81.7035 0.370516 81.976 0.370516H96.0939C101.233 0.370516 104.827 3.86712 104.827 8.87668C104.827 12.6423 102.644 15.7018 99.3185 16.9121L105.572 26.5041C105.786 26.8325 105.551 27.2675 105.159 27.2675H98.9512C98.7825 27.2675 98.6254 27.1812 98.5348 27.0388L92.4998 17.5509H88.0325V26.7738C88.0325 27.0465 87.8115 27.2675 87.539 27.2675H81.976ZM88.0325 11.6672H95.6908C97.2359 11.6672 98.2772 10.5577 98.2772 8.97754C98.2772 7.36372 97.2359 6.25423 95.6908 6.25423H88.0325V11.6672Z" fill="#141414"/>
        <path d="M123.953 0.370516C124.157 0.370516 124.34 0.495496 124.413 0.685326L134.476 26.5948C134.602 26.9183 134.363 27.2672 134.016 27.2673H128.395C128.189 27.2673 128.005 27.1399 127.933 26.9477L126.105 22.0895L124.09 16.6428L121.066 8.64092L118.615 15.13H122.617C122.958 15.13 123.196 15.468 123.081 15.7895L121.334 20.6862C121.264 20.8826 121.078 21.014 120.87 21.014H116.426L116.028 22.0895L114.2 26.9477C114.128 27.14 113.944 27.2673 113.738 27.2673H108.082C107.735 27.2673 107.497 26.9188 107.622 26.5952L117.652 0.685808C117.726 0.495745 117.909 0.370554 118.113 0.370516H123.953Z" fill="#141414"/>
      </svg>
    </div>
  </div>

  <div style="display: flex; gap: 12px;">
    <button class="replay-btn" onclick="replay()">Replay</button>
    <button class="replay-btn" onclick="toggleDark()" id="darkBtn">Dark mode</button>
    <button class="replay-btn" onclick="exportVideo()" id="exportBtn">Export WebM</button>
  </div>

  <script>
    // Resolve paths relative to this document's own URL (works inside iframes too)
    // Ensure trailing slash so relative paths resolve to this directory, not parent
    const loc = location.href.endsWith('/') || location.href.includes('.') ? location.href : location.href + '/';
    const BASE = new URL('.', loc).href;

    function toggleDark() {
      document.body.classList.toggle('dark');
      const btn = document.getElementById('darkBtn');
      btn.textContent = document.body.classList.contains('dark') ? 'Light mode' : 'Dark mode';
    }

    const SOUND_VOLUME = 0.25;

    // Tweak these two values to sync sound and animation
    const SOUND_DELAY = 200;      // ms before sound plays
    const ANIMATION_DELAY = 0;  // ms before animation starts

    const isEmbedded = window !== window.top;
    let soundTimer = null;
    let animTimer = null;

    function playSound() {
      const s = new Audio(BASE + 'snap.mp3');
      s.volume = SOUND_VOLUME;
      s.play();
    }

    function startAnimations() {
      document.querySelectorAll('.logo-icon, .logo-wordmark').forEach(el => {
        el.style.animationPlayState = 'running';
      });
    }

    function play(withSound) {
      clearTimeout(soundTimer);
      clearTimeout(animTimer);
      if (withSound) soundTimer = setTimeout(playSound, SOUND_DELAY);
      animTimer = setTimeout(startAnimations, ANIMATION_DELAY);
    }

    play(!isEmbedded);

    function replay() {
      const container = document.getElementById('logoContainer');
      const icon = container.querySelector('.logo-icon');
      const wordmark = container.querySelector('.logo-wordmark');

      const newIcon = icon.cloneNode(true);
      const newWordmark = wordmark.cloneNode(true);

      icon.replaceWith(newIcon);
      wordmark.replaceWith(newWordmark);

      play(true);
    }
    // ── Shared animation data (single source of truth for preview + export) ──

    // Cubic-bezier solver
    function cubicBezier(x1, y1, x2, y2) {
      function sampleCurveX(t) { return ((1 - 3*x2 + 3*x1)*t + (3*x2 - 6*x1))*t*t + 3*x1*t; }
      function sampleCurveY(t) { return ((1 - 3*y2 + 3*y1)*t + (3*y2 - 6*y1))*t*t + 3*y1*t; }
      function solveCurveX(x) {
        let t = x;
        for (let i = 0; i < 8; i++) {
          const dx = sampleCurveX(t) - x;
          const d = ((3*(1-3*x2+3*x1)*t + 2*(3*x2-6*x1))*t + 3*x1);
          if (Math.abs(dx) < 1e-6) return t;
          if (Math.abs(d) < 1e-6) break;
          t -= dx / d;
        }
        let lo = 0, hi = 1; t = x;
        for (let i = 0; i < 20; i++) {
          const v = sampleCurveX(t) - x;
          if (Math.abs(v) < 1e-6) return t;
          v > 0 ? hi = t : lo = t;
          t = (lo + hi) / 2;
        }
        return t;
      }
      return (x) => sampleCurveY(solveCurveX(x));
    }

    function interpolateKeyframes(keyframes, t) {
      if (t <= keyframes[0].at) return { ...keyframes[0] };
      if (t >= keyframes[keyframes.length - 1].at) return { ...keyframes[keyframes.length - 1] };
      for (let i = 0; i < keyframes.length - 1; i++) {
        if (t >= keyframes[i].at && t <= keyframes[i + 1].at) {
          const local = (t - keyframes[i].at) / (keyframes[i + 1].at - keyframes[i].at);
          const a = keyframes[i], b = keyframes[i + 1];
          return {
            opacity: a.opacity + (b.opacity - a.opacity) * local,
            x: a.x + (b.x - a.x) * local,
            y: (a.y || 0) + ((b.y || 0) - (a.y || 0)) * local,
            rotate: (a.rotate || 0) + ((b.rotate || 0) - (a.rotate || 0)) * local,
          };
        }
      }
    }

    // These match the @keyframes in the CSS above — edit both together
    const iconEasing = cubicBezier(0.25, 0, 0.6, 1);
    const wordmarkEasing = cubicBezier(0.22, 1, 0.36, 1);

    const iconKeyframes = [
      { at: 0,    opacity: 0, x: -120, y: 0, rotate: 240 },
      { at: 0.30, opacity: 1, x: -35,  y: 0, rotate: 240 },
      { at: 0.55, opacity: 1, x: 0,    y: 0, rotate: 360 },
      { at: 0.70, opacity: 1, x: 0,    y: 0, rotate: 355 },
      { at: 0.80, opacity: 1, x: 0,    y: 0, rotate: 360 },
      { at: 1,    opacity: 1, x: 0,    y: 0, rotate: 360 },
    ];

    const wordmarkKeyframes = [
      { at: 0,   opacity: 0, x: 120 },
      { at: 0.6, opacity: 1, x: -4 },
      { at: 1,   opacity: 1, x: 0 },
    ];

    // ── Export ──────────────────────────────────────────────

    async function loadSvgAsImage(svgEl, w, h, fillOverride) {
      const svgClone = svgEl.cloneNode(true);
      svgClone.setAttribute('width', w);
      svgClone.setAttribute('height', h);
      if (fillOverride) {
        svgClone.querySelectorAll('path').forEach(p => {
          if (p.getAttribute('fill') === '#141414' || p.getAttribute('fill') === '#FAFAFA') {
            p.setAttribute('fill', fillOverride);
          }
        });
      }
      const data = new XMLSerializer().serializeToString(svgClone);
      const blob = new Blob([data], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });
      URL.revokeObjectURL(url);
      return img;
    }

    async function exportVideo() {
      if (!location.protocol.startsWith('http')) {
        alert('Serve this documentation with "npx serve ." to export the animation.');
        return;
      }
      const btn = document.getElementById('exportBtn');
      btn.textContent = 'Exporting…';
      btn.disabled = true;

      const W = 1920, H = 1080;
      const FPS = 60;
      const TOTAL_DURATION = 2.5;
      const TOTAL_FRAMES = Math.ceil(TOTAL_DURATION * FPS);

      // Timing (matches CSS animation delays/durations)
      const ICON_DELAY = 0.15 + ANIMATION_DELAY / 1000;
      const ICON_DUR = 0.975;
      const WM_DELAY = 0.3 + ANIMATION_DELAY / 1000;
      const WM_DUR = 0.675;
      const SND_DELAY = SOUND_DELAY / 1000;

      // Theme-aware export
      const isDark = document.body.classList.contains('dark');
      const slideBg = isDark ? '#1B1E24' : '#FCFCFC';
      const wmFill = isDark ? '#FAFAFA' : '#141414';

      // Load SVGs as images (2x scale for 1080p)
      const iconSvg = document.querySelector('.logo-icon');
      const wordmarkSvg = document.querySelector('.logo-wordmark');
      const iconImg = await loadSvgAsImage(iconSvg, 116, 112);
      const wordmarkImg = await loadSvgAsImage(wordmarkSvg, 434, 88, wmFill);

      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');

      // Center positions (icon + gap + wordmark)
      const totalW = 116 + 34 + 434;
      const baseX = (W - totalW) / 2;
      const baseY = (H - 112) / 2;
      const wmBaseX = baseX + 116 + 34;
      const wmBaseY = baseY + (112 - 88) / 2;

      // Decode audio
      const audioCtx = new OfflineAudioContext(2, Math.ceil(TOTAL_DURATION * 44100), 44100);
      const audioResponse = await fetch(BASE + 'snap.mp3');
      const audioArrayBuffer = await audioResponse.arrayBuffer();
      const audioBuffer = await audioCtx.decodeAudioData(audioArrayBuffer);
      const source = audioCtx.createBufferSource();
      source.buffer = audioBuffer;
      const gainNode = audioCtx.createGain();
      gainNode.gain.value = SOUND_VOLUME;
      source.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      source.start(SND_DELAY);
      const renderedAudio = await audioCtx.startRendering();

      const realtimeCtx = new AudioContext({ sampleRate: 44100 });
      await realtimeCtx.resume();
      const audioSource = realtimeCtx.createBufferSource();
      audioSource.buffer = renderedAudio;
      const dest = realtimeCtx.createMediaStreamDestination();
      audioSource.connect(dest);

      // Manual frame mode — we push frames explicitly
      const videoStream = canvas.captureStream(0);
      const videoTrack = videoStream.getVideoTracks()[0];
      const combinedStream = new MediaStream([
        videoTrack,
        ...dest.stream.getAudioTracks(),
      ]);

      const chunks = [];
      const recorder = new MediaRecorder(combinedStream, {
        mimeType: 'video/webm;codecs=vp9,opus',
        videoBitsPerSecond: 8_000_000,
      });
      recorder.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
      const done = new Promise(res => { recorder.onstop = res; });

      // Draw first frame before starting so recorder has content
      function drawFrame(t) {
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = slideBg;
        ctx.fillRect(0, 0, W, H);

        let iconState = { opacity: 0, x: -120, y: 0, rotate: 240 };
        if (t >= ICON_DELAY) {
          const raw = Math.min(1, (t - ICON_DELAY) / ICON_DUR);
          iconState = interpolateKeyframes(iconKeyframes, iconEasing(raw));
        }

        let wmState = { opacity: 0, x: 120 };
        if (t >= WM_DELAY) {
          const raw = Math.min(1, (t - WM_DELAY) / WM_DUR);
          wmState = interpolateKeyframes(wordmarkKeyframes, wordmarkEasing(raw));
        }

        if (iconState.opacity > 0) {
          ctx.save();
          ctx.globalAlpha = iconState.opacity;
          const cx = baseX + 58 + iconState.x * 2;
          const cy = baseY + 56 + (iconState.y || 0) * 2;
          ctx.translate(cx, cy);
          ctx.rotate(iconState.rotate * Math.PI / 180);
          ctx.drawImage(iconImg, -58, -56, 116, 112);
          ctx.restore();
        }

        if (wmState.opacity > 0) {
          ctx.save();
          ctx.globalAlpha = wmState.opacity;
          ctx.drawImage(wordmarkImg, wmBaseX + wmState.x * 2, wmBaseY, 434, 88);
          ctx.restore();
        }

        videoTrack.requestFrame();
      }

      drawFrame(0);
      recorder.start();
      audioSource.start();
      const startTime = realtimeCtx.currentTime;

      // Drive frames off the audio clock so they stay in sync
      for (let frame = 1; frame < TOTAL_FRAMES; frame++) {
        const targetTime = frame / FPS;
        // Wait until the audio clock reaches the target time
        while (realtimeCtx.currentTime - startTime < targetTime) {
          await new Promise(res => setTimeout(res, 1));
        }
        drawFrame(targetTime);
      }

      recorder.stop();
      await done;
      realtimeCtx.close();

      const blob = new Blob(chunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `achra-logo-animation${isDark ? '-dark' : ''}.webm`;
      a.click();
      URL.revokeObjectURL(url);

      btn.textContent = 'Export WebM';
      btn.disabled = false;
    }
  </script>
</body>
</html>
